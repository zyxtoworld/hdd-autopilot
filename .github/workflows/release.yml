name: Build release packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-x86_64-pc-windows-msvc:
    name: Windows x86_64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.29
        with:
          cuda: "12.5.0"
      - name: Build package
        shell: cmd
        run: scripts\build-x86_64-pc-windows-msvc.bat
      - name: Require full package
        shell: pwsh
        run: |
          $status = (Get-Content dist/hdd-autopilot-x86_64-pc-windows-msvc.status -Raw).Trim()
          if ($status -ne "built") {
            throw "Expected built status, got '$status'. Degraded release packages are not allowed."
          }
      - uses: actions/upload-artifact@v4
        with:
          name: hdd-autopilot-x86_64-pc-windows-msvc
          path: |
            dist/hdd-autopilot-x86_64-pc-windows-msvc.exe
            dist/hdd-autopilot-x86_64-pc-windows-msvc.status
            dist/hdd-autopilot-x86_64-pc-windows-msvc.build.log
          if-no-files-found: error

  build-x86_64-apple-darwin:
    name: macOS x86_64
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build package
        run: bash scripts/build-x86_64-apple-darwin.sh
      - name: Require full package
        run: |
          status="$(tr -d '\r\n' < dist/hdd-autopilot-x86_64-apple-darwin.status)"
          if [ "$status" != "built" ]; then
            echo "::error::Expected built status, got '$status'. Degraded release packages are not allowed."
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: hdd-autopilot-x86_64-apple-darwin
          path: |
            dist/hdd-autopilot-x86_64-apple-darwin
            dist/hdd-autopilot-x86_64-apple-darwin.status
            dist/hdd-autopilot-x86_64-apple-darwin.log
          if-no-files-found: error

  build-aarch64-apple-darwin:
    name: macOS aarch64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build package
        run: bash scripts/build-aarch64-apple-darwin.sh
      - name: Require full package
        run: |
          status="$(tr -d '\r\n' < dist/hdd-autopilot-aarch64-apple-darwin.status)"
          if [ "$status" != "built" ]; then
            echo "::error::Expected built status, got '$status'. Degraded release packages are not allowed."
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: hdd-autopilot-aarch64-apple-darwin
          path: |
            dist/hdd-autopilot-aarch64-apple-darwin
            dist/hdd-autopilot-aarch64-apple-darwin.status
            dist/hdd-autopilot-aarch64-apple-darwin.log
          if-no-files-found: error

  build-x86_64-unknown-linux-gnu:
    name: Linux x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install OpenCL build dependencies
        run: sudo apt-get update && sudo apt-get install -y ocl-icd-opencl-dev opencl-headers
      - name: Build package
        run: bash scripts/build-x86_64-unknown-linux-gnu.sh
      - name: Require full package
        run: |
          status="$(tr -d '\r\n' < dist/hdd-autopilot-x86_64-unknown-linux-gnu.status)"
          if [ "$status" != "built" ]; then
            echo "::error::Expected built status, got '$status'. Degraded release packages are not allowed."
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: hdd-autopilot-x86_64-unknown-linux-gnu
          path: |
            dist/hdd-autopilot-x86_64-unknown-linux-gnu
            dist/hdd-autopilot-x86_64-unknown-linux-gnu.status
            dist/hdd-autopilot-x86_64-unknown-linux-gnu.log
          if-no-files-found: error

  build-aarch64-unknown-linux-gnu:
    name: Linux aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install OpenCL build dependencies
        run: sudo apt-get update && sudo apt-get install -y ocl-icd-opencl-dev opencl-headers
      - name: Build package
        run: bash scripts/build-aarch64-unknown-linux-gnu.sh
      - name: Require full package
        run: |
          status="$(tr -d '\r\n' < dist/hdd-autopilot-aarch64-unknown-linux-gnu.status)"
          if [ "$status" != "built" ]; then
            echo "::error::Expected built status, got '$status'. Degraded release packages are not allowed."
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: hdd-autopilot-aarch64-unknown-linux-gnu
          path: |
            dist/hdd-autopilot-aarch64-unknown-linux-gnu
            dist/hdd-autopilot-aarch64-unknown-linux-gnu.status
            dist/hdd-autopilot-aarch64-unknown-linux-gnu.log
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-x86_64-pc-windows-msvc
      - build-x86_64-apple-darwin
      - build-aarch64-apple-darwin
      - build-x86_64-unknown-linux-gnu
      - build-aarch64-unknown-linux-gnu
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-release/hdd-autopilot-x86_64-pc-windows-msvc.exe
            dist-release/hdd-autopilot-x86_64-apple-darwin
            dist-release/hdd-autopilot-aarch64-apple-darwin
            dist-release/hdd-autopilot-x86_64-unknown-linux-gnu
            dist-release/hdd-autopilot-aarch64-unknown-linux-gnu
