name: Build release packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-win-x64:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build package
        shell: cmd
        run: scripts\build-win-x64.bat
      - uses: actions/upload-artifact@v4
        with:
          name: hdd-autopilot-win-x64
          path: |
            dist/hdd-autopilot-win-x64.exe
            dist/hdd-autopilot-win-x64.status
            dist/hdd-autopilot-win-x64.build.log
          if-no-files-found: error

  build-macos-amd64:
    name: macOS amd64
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build package
        run: bash scripts/build-macos-amd64.sh
      - uses: actions/upload-artifact@v4
        with:
          name: hdd-autopilot-macos-amd64
          path: |
            dist/hdd-autopilot-macos-amd64
            dist/hdd-autopilot-macos-amd64.status
            dist/hdd-autopilot-macos-amd64.log
          if-no-files-found: error

  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build package
        run: bash scripts/build-macos-arm64.sh
      - uses: actions/upload-artifact@v4
        with:
          name: hdd-autopilot-macos-arm64
          path: |
            dist/hdd-autopilot-macos-arm64
            dist/hdd-autopilot-macos-arm64.status
            dist/hdd-autopilot-macos-arm64.log
          if-no-files-found: error

  build-linux-amd64:
    name: Linux amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mlugg/setup-zig@v2
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked
      - name: Build package
        run: bash scripts/build-linux-amd64.sh
      - uses: actions/upload-artifact@v4
        with:
          name: hdd-autopilot-linux-amd64
          path: |
            dist/hdd-autopilot-linux-amd64
            dist/hdd-autopilot-linux-amd64.status
            dist/hdd-autopilot-linux-amd64.log
          if-no-files-found: error

  build-linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mlugg/setup-zig@v2
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked
      - name: Build package
        run: bash scripts/build-linux-arm64.sh
      - uses: actions/upload-artifact@v4
        with:
          name: hdd-autopilot-linux-arm64
          path: |
            dist/hdd-autopilot-linux-arm64
            dist/hdd-autopilot-linux-arm64.status
            dist/hdd-autopilot-linux-arm64.log
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-win-x64
      - build-macos-amd64
      - build-macos-arm64
      - build-linux-amd64
      - build-linux-arm64
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-release/hdd-autopilot-win-x64.exe
            dist-release/hdd-autopilot-macos-amd64
            dist-release/hdd-autopilot-macos-arm64
            dist-release/hdd-autopilot-linux-amd64
            dist-release/hdd-autopilot-linux-arm64
